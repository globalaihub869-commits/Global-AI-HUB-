openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tools
    description: AI Tools directory
  - name: news
    description: AI News digests
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tools:
    get:
      operationId: listTools
      tags: [tools]
      summary: List AI tools
      description: Returns the full list of AI tools with optional search and filter query params
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Full-text search across name and description
        - name: domain
          in: query
          required: false
          schema:
            type: string
          description: Filter by domain category (e.g. LLMs, Code AI)
        - name: pricing
          in: query
          required: false
          schema:
            type: string
            enum: [Free, Freemium, Premium]
          description: Filter by pricing tier
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [Text, Image, Audio, Code, Video, Data]
          description: Filter by output type
      responses:
        "200":
          description: List of AI tools
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolListResponse"

  /tools/{id}:
    get:
      operationId: getTool
      tags: [tools]
      summary: Get a single AI tool
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: AI tool details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tool"
        "404":
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /news:
    get:
      operationId: listNews
      tags: [news]
      summary: List AI news digests
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Full-text search across title, source, tags and summary
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Filter by news category
      responses:
        "200":
          description: List of news digests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsListResponse"

  /news/{id}:
    get:
      operationId: getNewsArticle
      tags: [news]
      summary: Get a single news digest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: News digest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsDigest"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Tool:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        domain:
          type: string
        tags:
          type: array
          items:
            type: string
        pricing:
          type: string
          enum: [Free, Freemium, Premium]
        outputTypes:
          type: array
          items:
            type: string
            enum: [Text, Image, Audio, Code, Video, Data]
        rating:
          type: number
        users:
          type: string
        verified:
          type: boolean
        trending:
          type: boolean
        url:
          type: string
        accentColor:
          type: string
      required:
        - id
        - name
        - description
        - domain
        - tags
        - pricing
        - outputTypes
        - rating
        - users
        - verified
        - trending
        - url
        - accentColor

    ToolListResponse:
      type: object
      properties:
        tools:
          type: array
          items:
            $ref: "#/components/schemas/Tool"
        total:
          type: integer
      required:
        - tools
        - total

    NewsDigest:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        category:
          type: string
          enum: [Models, Funding, Research, Regulation, Releases, Hardware, Open Source, Industry]
        source:
          type: string
        sourceUrl:
          type: string
        publishedAt:
          type: string
          format: date-time
        featured:
          type: boolean
        readTimeMinutes:
          type: integer
        summary:
          type: array
          items:
            type: string
          minItems: 3
          maxItems: 3
          description: Exactly 3 AI-generated bullet-point summary lines
        tags:
          type: array
          items:
            type: string
      required:
        - id
        - title
        - category
        - source
        - sourceUrl
        - publishedAt
        - featured
        - readTimeMinutes
        - summary
        - tags

    NewsListResponse:
      type: object
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/NewsDigest"
        total:
          type: integer
        featured:
          $ref: "#/components/schemas/NewsDigest"
      required:
        - articles
        - total

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
