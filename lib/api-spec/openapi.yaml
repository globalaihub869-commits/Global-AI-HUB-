openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tools
    description: AI Tools directory
  - name: news
    description: AI News digests
  - name: jobs
    description: AI industry job board
  - name: social
    description: Community chat, direct messaging, and activity feed
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tools:
    get:
      operationId: listTools
      tags: [tools]
      summary: List AI tools
      description: Returns the full list of AI tools with optional search and filter query params
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Full-text search across name and description
        - name: domain
          in: query
          required: false
          schema:
            type: string
          description: Filter by domain category (e.g. LLMs, Code AI)
        - name: pricing
          in: query
          required: false
          schema:
            type: string
            enum: [Free, Freemium, Premium]
          description: Filter by pricing tier
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [Text, Image, Audio, Code, Video, Data]
          description: Filter by output type
      responses:
        "200":
          description: List of AI tools
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolListResponse"

  /tools/{id}:
    get:
      operationId: getTool
      tags: [tools]
      summary: Get a single AI tool
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: AI tool details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tool"
        "404":
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /news:
    get:
      operationId: listNews
      tags: [news]
      summary: List AI news digests
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Full-text search across title, source, tags and summary
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Filter by news category
      responses:
        "200":
          description: List of news digests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsListResponse"

  /news/{id}:
    get:
      operationId: getNewsArticle
      tags: [news]
      summary: Get a single news digest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: News digest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsDigest"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List job board postings
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Full-text search across title, company and tags
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Filter by job category
      responses:
        "200":
          description: List of job postings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
    post:
      operationId: postJob
      tags: [jobs]
      summary: Post a new job listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  job:
                    $ref: "#/components/schemas/Job"
                required: [job]
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{id}/apply:
    post:
      operationId: applyToJob
      tags: [jobs]
      summary: Submit an application to a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobApplicationInput"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  applicationId:
                    type: string
                required: [success, applicationId]
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/messages:
    get:
      operationId: listChatMessages
      tags: [social]
      summary: List global community chat messages
      parameters:
        - name: after
          in: query
          required: false
          schema:
            type: string
          description: ISO timestamp; only return messages after this time
      responses:
        "200":
          description: Chat messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChatMessage"
                required: [messages]
    post:
      operationId: postChatMessage
      tags: [social]
      summary: Post a message to the global community chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "201":
          description: Message posted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/ChatMessage"
                required: [message]
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations:
    get:
      operationId: listConversations
      tags: [social]
      summary: List the current user's direct message conversations
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Conversation"
                required: [conversations]
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: startConversation
      tags: [social]
      summary: Start (or continue) a direct message conversation with a vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartConversationInput"
      responses:
        "201":
          description: Conversation started
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation:
                    $ref: "#/components/schemas/Conversation"
                required: [conversation]
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations/{id}/messages:
    get:
      operationId: listConversationMessages
      tags: [social]
      summary: List messages within a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Direct messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/DirectMessage"
                required: [messages]
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: sendConversationMessage
      tags: [social]
      summary: Send a message within an existing conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationMessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    $ref: "#/components/schemas/DirectMessage"
                required: [message]
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /activity:
    get:
      operationId: listActivity
      tags: [social]
      summary: List recent platform activity feed events
      parameters:
        - name: after
          in: query
          required: false
          schema:
            type: string
          description: ISO timestamp; only return events after this time
      responses:
        "200":
          description: Activity events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/ActivityEvent"
                required: [events]
    post:
      operationId: recordActivity
      tags: [social]
      summary: Record a new activity feed event for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityInput"
      responses:
        "201":
          description: Event recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  event:
                    $ref: "#/components/schemas/ActivityEvent"
                required: [event]
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Tool:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        domain:
          type: string
        tags:
          type: array
          items:
            type: string
        pricing:
          type: string
          enum: [Free, Freemium, Premium]
        outputTypes:
          type: array
          items:
            type: string
            enum: [Text, Image, Audio, Code, Video, Data]
        rating:
          type: number
        users:
          type: string
        verified:
          type: boolean
        trending:
          type: boolean
        url:
          type: string
        accentColor:
          type: string
      required:
        - id
        - name
        - description
        - domain
        - tags
        - pricing
        - outputTypes
        - rating
        - users
        - verified
        - trending
        - url
        - accentColor

    ToolListResponse:
      type: object
      properties:
        tools:
          type: array
          items:
            $ref: "#/components/schemas/Tool"
        total:
          type: integer
        intentSummary:
          type: string
          description: Human-readable explanation of the detected search intent, present when semantic matching was used
      required:
        - tools
        - total

    Job:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        company:
          type: string
        category:
          type: string
        type:
          type: string
          enum: [Full-time, Part-time, Contract, Freelance]
        location:
          type: string
        remote:
          type: boolean
        salaryRange:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        postedAt:
          type: string
        accentColor:
          type: string
      required:
        - id
        - title
        - company
        - category
        - type
        - location
        - remote
        - salaryRange
        - description
        - tags
        - postedAt
        - accentColor

    JobInput:
      type: object
      properties:
        title:
          type: string
        company:
          type: string
        category:
          type: string
        type:
          type: string
          enum: [Full-time, Part-time, Contract, Freelance]
        location:
          type: string
        remote:
          type: boolean
        salaryRange:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
      required:
        - title
        - company
        - category
        - type
        - location
        - salaryRange
        - description

    JobListResponse:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        total:
          type: integer
      required:
        - jobs
        - total

    JobApplicationInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        message:
          type: string
      required:
        - name
        - email

    ChatMessage:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        userName:
          type: string
        text:
          type: string
        createdAt:
          type: string
      required:
        - id
        - userId
        - userName
        - text
        - createdAt

    DirectMessage:
      type: object
      properties:
        id:
          type: string
        conversationId:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        text:
          type: string
        createdAt:
          type: string
      required:
        - id
        - conversationId
        - senderId
        - senderName
        - text
        - createdAt

    Conversation:
      type: object
      properties:
        id:
          type: string
        jobId:
          type: [string, "null"]
        jobTitle:
          type: [string, "null"]
        participantIds:
          type: array
          items:
            type: string
        participantNames:
          type: object
          additionalProperties:
            type: string
        lastMessage:
          type: string
        lastMessageAt:
          type: string
      required:
        - id
        - jobId
        - jobTitle
        - participantIds
        - participantNames
        - lastMessage
        - lastMessageAt

    ChatMessageInput:
      type: object
      properties:
        text:
          type: string
      required:
        - text

    StartConversationInput:
      type: object
      properties:
        jobId:
          type: string
        jobTitle:
          type: string
        vendorName:
          type: string
        text:
          type: string
      required:
        - vendorName
        - text

    ConversationMessageInput:
      type: object
      properties:
        text:
          type: string
      required:
        - text

    ActivityInput:
      type: object
      properties:
        type:
          type: string
          enum: [like, job_posted, tool_visited, job_applied, chat_joined]
        targetName:
          type: string
      required:
        - type
        - targetName

    ActivityEvent:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [like, job_posted, tool_visited, job_applied, chat_joined]
        actorName:
          type: string
        targetName:
          type: string
        createdAt:
          type: string
      required:
        - id
        - type
        - actorName
        - targetName
        - createdAt

    NewsDigest:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        category:
          type: string
          enum: [Models, Funding, Research, Regulation, Releases, Hardware, Open Source, Industry]
        source:
          type: string
        sourceUrl:
          type: string
        publishedAt:
          type: string
          format: date-time
        featured:
          type: boolean
        readTimeMinutes:
          type: integer
        summary:
          type: array
          items:
            type: string
          minItems: 3
          maxItems: 3
          description: Exactly 3 AI-generated bullet-point summary lines
        tags:
          type: array
          items:
            type: string
      required:
        - id
        - title
        - category
        - source
        - sourceUrl
        - publishedAt
        - featured
        - readTimeMinutes
        - summary
        - tags

    NewsListResponse:
      type: object
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/NewsDigest"
        total:
          type: integer
        featured:
          $ref: "#/components/schemas/NewsDigest"
      required:
        - articles
        - total

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
